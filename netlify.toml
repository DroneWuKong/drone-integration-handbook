[build]
  base = "site"
  publish = "dist"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/forge"
  to = "https://forgeprole.netlify.app"
  status = 301
  force = true

[[redirects]]
  from = "/forge/*"
  to = "https://forgeprole.netlify.app/:splat"
  status = 301
  force = true
