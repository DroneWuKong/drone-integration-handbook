[build]
  publish = "site"
  command = "pip3 install -r requirements.txt && python3 build.py"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/forge"
  to = "https://forgeprole.netlify.app"
  status = 301
  force = true

[[redirects]]
  from = "/forge/*"
  to = "https://forgeprole.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/patterns"
  to = "https://forgeprole.netlify.app/patterns/"
  status = 301
  force = true

[[redirects]]
  from = "/patterns/"
  to = "https://forgeprole.netlify.app/patterns/"
  status = 301
  force = true

# Analytics dashboard lives on Forge — redirect handbook visitors there
[[redirects]]
  from = "/analytics"
  to = "https://forgeprole.netlify.app/analytics/"
  status = 301
  force = true

[[redirects]]
  from = "/analytics/"
  to = "https://forgeprole.netlify.app/analytics/"
  status = 301
  force = true
