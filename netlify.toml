[build]
  publish = "site"
  command = "pip3 install -r requirements.txt && python3 build.py"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/forge"
  to = "https://nvmillbuilditmyself.com"
  status = 301
  force = true

[[redirects]]
  from = "/forge/*"
  to = "https://nvmillbuilditmyself.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/patterns"
  to = "https://nvmillbuilditmyself.com/patterns/"
  status = 301
  force = true

[[redirects]]
  from = "/patterns/"
  to = "https://nvmillbuilditmyself.com/patterns/"
  status = 301
  force = true

# Analytics dashboard lives on Forge — redirect handbook visitors there
[[redirects]]
  from = "/analytics"
  to = "https://nvmillbuilditmyself.com/analytics/"
  status = 301
  force = true

[[redirects]]
  from = "/analytics/"
  to = "https://nvmillbuilditmyself.com/analytics/"
  status = 301
  force = true
