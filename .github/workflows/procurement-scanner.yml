name: "📋 Procurement Scanner — SAM.gov/USASpending (Daily 2PM UTC)"

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 14:00 UTC — runs alongside intel miner
  workflow_dispatch:       # Manual trigger
    inputs:
      start_date:
        description: 'Start date for search (YYYY-MM-DD)'
        required: false
        default: '2024-01-01'
      full_scan:
        description: 'Run full scan (all sources)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  scan-procurement:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run Procurement Scraper
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: |
          python pipeline/procurement/scraper.py \
            --full \
            --start-date ${{ github.event.inputs.start_date || '2024-01-01' }} \
            --limit 50
      
      - name: Summarize results
        run: |
          echo "### Procurement Scanner Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f data/procurement/gray_zone_matches.json ]; then
            python3 -c "
          import json
          with open('data/procurement/gray_zone_matches.json') as f:
              data = json.load(f)
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Federal awards | {data.get(\"federal_awards_total\", 0)} |')
          print(f'| Gray zone matches | {data.get(\"gray_zone_federal_matches\", 0)} |')
          print(f'| News mentions | {data.get(\"gray_zone_news_mentions\", 0)} |')
          vendors = data.get('vendors_flagged', [])
          if vendors:
              print(f'| Vendors flagged | {\", \".join(vendors)} |')
          " >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Commit procurement data
        run: |
          git config user.name "PIE Procurement Scanner"
          git config user.email "pie@drone-forge.dev"

          if [ -n "$(git status --porcelain data/procurement/)" ]; then
            git add data/procurement/

            MATCHES=$(python3 -c "import json; d=json.load(open('data/procurement/gray_zone_matches.json')); print(d.get('gray_zone_federal_matches',0)+d.get('gray_zone_news_mentions',0))" 2>/dev/null || echo 0)
            SOLS=$(python3 -c "import json; d=json.load(open('data/procurement/solicitations.json')); print(d.get('meta',{}).get('total_solicitations',0))" 2>/dev/null || echo 0)

            git commit -m "📡 Procurement scan: ${SOLS} solicitations · ${MATCHES} gray zone signals" \
                       -m "Automated daily scan — USAspending, SAM.gov, SBIR.gov, News RSS. NAICS: 336411/334515/334511/517410/541370/541519/541715/928110"

            git push
          else
            echo "No new procurement data to commit"
          fi

      - name: Push procurement data to Forge Blobs
        env:
          FORGE_BLOBS_ADMIN_KEY: ${{ secrets.FORGE_BLOBS_ADMIN_KEY }}
        run: |
          if [ -z "${FORGE_BLOBS_ADMIN_KEY}" ]; then
            echo "FORGE_BLOBS_ADMIN_KEY not set — skipping Forge Blobs sync"
            exit 0
          fi

          push_blob() {
            local TYPE=$1
            local FILE=$2
            if [ ! -f "$FILE" ]; then
              echo "  $TYPE: file not found, skipping"
              return
            fi
            HTTP_CODE=$(curl -s -o /tmp/blob_resp.json -w "%{http_code}" -X POST \
              "https://nvmillbuilditmyself.com/.netlify/functions/forge-data?type=${TYPE}" \
              -H "Authorization: Bearer ${FORGE_BLOBS_ADMIN_KEY}" \
              -H "Content-Type: application/json" \
              --data @"$FILE")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ $TYPE → Forge Blobs"
            else
              echo "  ⚠ $TYPE → HTTP $HTTP_CODE"
              cat /tmp/blob_resp.json || true
            fi
          }

          push_blob federal_awards   data/procurement/federal_awards.json
          push_blob solicitations    data/procurement/solicitations.json
