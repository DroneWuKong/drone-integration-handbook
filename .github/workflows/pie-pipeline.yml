name: Pattern Intelligence Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC

  workflow_dispatch: {}   # Manual trigger from Actions tab

  push:
    paths:
      - 'data/parts-db/**'
      - 'data/forge_database.json'
      - 'platforms/**'
      - 'pipeline/pie_pipeline_live.py'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No pip install needed — live pipeline uses only stdlib

      - name: Run PIE Live Pipeline
        run: python pipeline/pie_pipeline_live.py

      - name: Validate output
        run: |
          python3 -c "
          import json, sys
          for f in ['data/flags.json', 'data/predictions.json']:
              data = json.load(open(f))
              print(f'  ✓ {f}: {len(data)} entries')
          "

      - name: Commit if changed
        run: |
          git config user.name "PIE Bot"
          git config user.email "pie-bot@users.noreply.github.com"
          git add data/flags.json data/predictions.json

          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
            echo "DATA_CHANGED=false" >> $GITHUB_ENV
          else
            FLAGS=$(python3 -c "import json; print(len(json.load(open('data/flags.json'))))")
            PREDS=$(python3 -c "import json; print(len(json.load(open('data/predictions.json'))))")
            git commit -m "🔍 PIE: ${FLAGS} flags, ${PREDS} predictions | $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "DATA_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Sync to Forge repo
        if: env.DATA_CHANGED == 'true'
        env:
          FORGE_PAT: ${{ secrets.FORGE_PAT }}
        run: |
          if [ -z "$FORGE_PAT" ]; then
            echo "⚠ FORGE_PAT secret not set — skipping Forge sync"
            echo "  Add a PAT with repo scope as FORGE_PAT in Settings → Secrets"
            exit 0
          fi

          echo "Syncing data to Forge repo..."
          git clone --depth 1 https://${FORGE_PAT}@github.com/DroneWuKong/droneclear_Forge.git /tmp/forge
          
          FORGE_SRC="DroneClear Components Visualizer"
          cp data/flags.json "/tmp/forge/${FORGE_SRC}/pie_flags.json"
          cp data/predictions.json "/tmp/forge/${FORGE_SRC}/pie_predictions.json"
          
          cd /tmp/forge
          git config user.name "PIE Bot"
          git config user.email "pie-bot@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "Forge already up to date"
          else
            FLAGS=$(python3 -c "import json; print(len(json.load(open('${FORGE_SRC}/pie_flags.json'))))")
            git commit -m "🔍 PIE sync: ${FLAGS} flags | $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Forge repo updated — Netlify will redeploy"
          fi

      - name: Summary
        run: |
          python3 -c "
          import json
          flags = json.load(open('data/flags.json'))
          preds = json.load(open('data/predictions.json'))
          sevs = {}
          for f in flags:
              s = f.get('severity','?')
              sevs[s] = sevs.get(s, 0) + 1

          print('## PIE Pipeline Run')
          print('')
          print('| Metric | Value |')
          print('|--------|-------|')
          print(f'| Flags | {len(flags)} |')
          print(f'| Predictions | {len(preds)} |')
          for s in ['critical','warning','info']:
              print(f'| {s.title()} | {sevs.get(s, 0)} |')
          print('')
          print('### Top Flags')
          for f in flags[:10]:
              print(f'- **[{f[\"severity\"]}]** {f[\"title\"][:80]}')
          " >> $GITHUB_STEP_SUMMARY
