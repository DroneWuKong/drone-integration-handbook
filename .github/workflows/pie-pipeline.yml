name: Pattern Intelligence Pipeline

on:
  schedule:
    - cron: '30 14 * * *'  # Daily at 14:30 UTC (30 min after miners at 14:00 UTC)

  workflow_dispatch: {}   # Manual trigger from Actions tab

  push:
    paths:
      - 'data/parts-db/**'
      - 'data/forge_database.json'
      - 'platforms/**'
      - 'pipeline/pie_pipeline_live.py'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Sync parts-db from canonical source (Ai-Project repo)
      - name: Sync parts-db from Ai-Project
        env:
          FORGE_PAT: ${{ secrets.FORGE_PAT }}
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          echo "Syncing parts-db from Ai-Project (canonical source)..."

          # Prefer SYNC_PAT (scoped to Ai-Project) over FORGE_PAT
          ACCESS_TOKEN="${SYNC_PAT:-$FORGE_PAT}"

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "  ⚠ No PAT available — using existing parts-db"
            exit 0
          fi

          CLONE_URL="https://${ACCESS_TOKEN}@github.com/DroneWuKong/Ai-Project.git"

          # Clone with visible errors (no 2>/dev/null) so failures are diagnosable
          if git clone --depth 1 --filter=blob:none --sparse "$CLONE_URL" /tmp/ai-project; then
            git -C /tmp/ai-project sparse-checkout set data/parts-db

            if [ -d "/tmp/ai-project/data/parts-db" ]; then
              cp /tmp/ai-project/data/parts-db/*.json data/parts-db/
              PARTS=$(python3 -c "
          import json, glob
          t=0
          for f in glob.glob('data/parts-db/*.json'):
              d=json.load(open(f))
              if isinstance(d,list): t+=len(d)
          print(t)
          ")
              echo "  ✓ Synced: ${PARTS} components"
            else
              echo "  ⚠ parts-db directory not found in Ai-Project — using existing"
            fi
          else
            echo "  ⚠ Clone failed (auth or network) — using existing parts-db"
          fi
          rm -rf /tmp/ai-project

      - name: Run PIE Live Pipeline
        env:
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
        run: python pipeline/pie_pipeline_live.py

      - name: Validate output
        run: |
          python3 -c "
          import json, sys
          for f in ['data/flags.json', 'data/predictions.json']:
              data = json.load(open(f))
              print(f'  ✓ {f}: {len(data)} entries')
          "

      - name: Commit if changed
        run: |
          git config user.name "PIE Bot"
          git config user.email "pie-bot@users.noreply.github.com"
          git add data/parts-db/ data/flags.json data/predictions.json

          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
            echo "DATA_CHANGED=false" >> $GITHUB_ENV
          else
            FLAGS=$(python3 -c "import json; print(len(json.load(open('data/flags.json'))))")
            PREDS=$(python3 -c "import json; print(len(json.load(open('data/predictions.json'))))")
            git commit -m "🔍 PIE: ${FLAGS} flags, ${PREDS} predictions | $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "DATA_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Sync to Forge repo
        if: env.DATA_CHANGED == 'true'
        env:
          FORGE_PAT: ${{ secrets.FORGE_PAT }}
        run: |
          if [ -z "$FORGE_PAT" ]; then
            echo "⚠ FORGE_PAT secret not set — skipping Forge sync"
            echo "  Add a PAT with repo scope as FORGE_PAT in Settings → Secrets"
            exit 0
          fi

          echo "Syncing data to Forge repo..."
          git clone --depth 1 https://${FORGE_PAT}@github.com/DroneWuKong/droneclear_Forge.git /tmp/forge
          
          FORGE_SRC="DroneClear Components Visualizer"
          cp data/flags.json "/tmp/forge/${FORGE_SRC}/pie_flags.json"
          cp data/predictions.json "/tmp/forge/${FORGE_SRC}/pie_predictions.json"
          
          # Merge followup flags with proper schema mapping
          if [ -f "data/grayzone/followup_flags.json" ]; then
            echo "Merging followup flags..."
            python3 pipeline/sync_followups_to_forge.py \
              "/tmp/forge/${FORGE_SRC}/pie_flags.json" \
              "data/grayzone/followup_flags.json"
          fi
          
          cd /tmp/forge
          git config user.name "PIE Bot"
          git config user.email "pie-bot@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "Forge already up to date"
          else
            FLAGS=$(python3 -c "import json; print(len(json.load(open('${FORGE_SRC}/pie_flags.json'))))")
            PREDS=$(python3 -c "import json; print(len(json.load(open('${FORGE_SRC}/pie_predictions.json'))))")
            git commit -m "🔍 PIE sync: ${FLAGS} flags, ${PREDS} predictions | $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Forge repo updated — Netlify will redeploy"
          fi

      - name: Generate Daily Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Generating PIE Intelligence Brief..."
          python3 pipeline/brief_generator.py
          
          if [ -f "data/briefs/$(date -u +%Y-%m-%d).json" ]; then
            echo "✓ Brief generated"
            # Include brief in Forge sync
            BRIEF_DATE=$(date -u +%Y-%m-%d)
            cp "data/briefs/${BRIEF_DATE}.json" /tmp/forge/"DroneClear Components Visualizer/pie_brief.json" 2>/dev/null || true
            cp "data/briefs/${BRIEF_DATE}.md"   /tmp/forge/"DroneClear Components Visualizer/pie_brief.md"   2>/dev/null || true
          else
            echo "⚠ Brief generation skipped (ANTHROPIC_API_KEY may not be set)"
          fi

      - name: Commit brief to handbook
        run: |
          BRIEF_DATE=$(date -u +%Y-%m-%d)
          BRIEF_FILE="data/briefs/${BRIEF_DATE}.json"
          if [ -f "$BRIEF_FILE" ]; then
            git config user.name "PIE Bot"
            git config user.email "pie-bot@users.noreply.github.com"
            git add data/briefs/
            if ! git diff --staged --quiet; then
              git commit -m "📋 PIE Brief: ${BRIEF_DATE}"
              git push
            fi
          fi

      - name: Summary
        run: |
          python3 -c "
          import json
          flags = json.load(open('data/flags.json'))
          preds = json.load(open('data/predictions.json'))
          sevs = {}
          for f in flags:
              s = f.get('severity','?')
              sevs[s] = sevs.get(s, 0) + 1

          print('## PIE Pipeline Run')
          print('')
          print('| Metric | Value |')
          print('|--------|-------|')
          print(f'| Flags | {len(flags)} |')
          print(f'| Predictions | {len(preds)} |')
          for s in ['critical','warning','info']:
              print(f'| {s.title()} | {sevs.get(s, 0)} |')
          print('')
          print('### Top Flags')
          for f in flags[:10]:
              print(f'- **[{f[\"severity\"]}]** {f[\"title\"][:80]}')
          " >> $GITHUB_STEP_SUMMARY
